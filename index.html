<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Nusayf Company - Premium Business Solutions">
  <title>Nusayf Company</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
    }

    header {
      height: 100vh;
      background: linear-gradient(rgba(11,93,59,0.85), rgba(11,93,59,0.85));
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      padding: 20px;
    }

    header img {
      width: 150px;
      margin-bottom: 20px;
    }

    header h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    header p {
      font-size: 18px;
      margin-bottom: 20px;
    }

    .btn {
      background: #d4af37;
      padding: 14px 28px;
      border-radius: 8px;
      color: black;
      text-decoration: none;
      font-weight: bold;
    }

    .btn:hover {
      background: #c19a2e;
    }
  </style>
</head>

<body>

  <header>
    <img src="image.jpg" alt="Nusayf Company Logo">
    <h1>Nusayf Company</h1>
    <p>We Care • Quality • Innovation • Sustainability</p>
    <a href="#" class="btn">Start Business With Us</a>
  </header>

</body>
</html>
